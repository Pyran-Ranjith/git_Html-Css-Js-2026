<!doctype html>
<html>
  <head>
    <title>Lession-02 Learning HTML</title>
  </head>
  <body>
    <p>hello, <strong>ninjas</strong></p><!-- strong: bold -->
    <p>my <small>first</small> web <em>page!</em></p><!-- small: small, em: italic -->
    <a href="about.html">About</a>

    <h1>heading 1</h1>
    <h2>heading 2</h2>
    <h3>heading 3</h3>
    <h4>heading 4</h4>

    <ul><!-- unordered list --> <ol><!-- ordered list -->
      <li>ninja</li>
      <li>samurai</li>
      <li>pirate</li>
    </ul>

    <!-- divisions, or divs, are used to group elements together -->
    <div>
      <p>this is a div</p>
      <p>divs are used to group elements together</p>
    </div>

    <!-- span elements are used to group text together, but they don't create a new line like divs do -->
      <span>this is a span</span>

    <!-- <br>  line break -->
    <div>
      <span>this <br>is a span</span>
    </div>

    <!-- horizontal rule -->
    <hr>

    <!-- link  -->
    <a href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQz412LzP_81GvQBoRtcVgoS_zCaYvPF4WwfEopVdTrrXaB3u6hslAt0Ww&s">Google Logo</a>

    <!-- image -->
    <img src="../img/thumb-1.png" alt="thumb image">

    <blockquote cite="https://www.w3schools.com/html/html_blockquotes.asp">
      we are learning HTML and CSS, and it's really fun!
    </blockquote>

    <p style="color: orange;"> style me:</p>

  </body>
</html>
