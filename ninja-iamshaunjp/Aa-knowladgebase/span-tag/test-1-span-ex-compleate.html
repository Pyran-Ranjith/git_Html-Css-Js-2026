<!doctype html>
<html>
  <head>
    <title>Lession-04 CSS Basics</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
      .login-btn {
        padding: 10px 20px;
        background: #007bff;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
      }
      .me-2 {
        margin-right: 8px;
      }
    </style>
  </head>
  <body>
    <h2>Inline elements</h2>
    <button type="submit" class="login-btn" id="loginBtn">
        <span><i class="fas fa-sign-in-alt me-2"></i>Login to Dashboard</span>
        <i class="fas fa-arrow-right"></i>
    </button>
  </body>
</html>
